apiVersion: apps/v1
kind: Deployment
metadata:
  name: caresync-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: caresync-backend
  template:
    metadata:
      labels:
        app: caresync-backend
    spec:
      containers:
      - name: backend
        image: caresync-backend:latest
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: caresync-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caresync-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: caresync-frontend
  template:
    metadata:
      labels:
        app: caresync-frontend
    spec:
      containers:
      - name: frontend
        image: caresync-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caresync-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: caresync-ml
  template:
    metadata:
      labels:
        app: caresync-ml
    spec:
      containers:
      - name: ml-service
        image: caresync-ml:latest
        ports:
        - containerPort: 5001
