apiVersion: v1
kind: Service
metadata:
  name: caresync-backend-svc
spec:
  selector:
    app: caresync-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: caresync-frontend-svc
spec:
  selector:
    app: caresync-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: caresync-ml-svc
spec:
  selector:
    app: caresync-ml
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
  type: ClusterIP
